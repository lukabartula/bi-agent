<rect x="0" y="0" width="1600" height="900" fill="#f9f9f7"/>
<text x="40" y="42" font-size="22" font-weight="700" fill="#0b0b0b">BI Agent — Runtime Architecture</text>
<text x="40" y="64" font-size="12.5" fill="#52514e">Claude Code reaches the Olist warehouse two ways — a local stdio MCP for SQL, and an HTTP MCP into Superset for dashboards.</text>
<text x="40" y="82" font-size="12.5" fill="#52514e">The Superset MCP is library-first: it writes chart/dashboard defs straight to the metadata DB via Superset’s own Commands/DAOs, not through the webserver.</text>
