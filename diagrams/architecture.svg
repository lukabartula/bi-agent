<text x="1154" y="114" font-size="12" font-weight="700" fill="#0b0b0b">Legend</text>
<rect x="1154" y="130" width="14" height="14" rx="3" fill="#2a78d6"/>
<text x="1174" y="141" font-size="10.8" fill="#52514e">Client (Claude Code)</text>
<rect x="1154" y="152" width="14" height="14" rx="3" fill="#4a3aa7"/>
<text x="1174" y="163" font-size="10.8" fill="#52514e">MCP server / adapter</text>
<rect x="1154" y="174" width="14" height="14" rx="3" fill="#eb6834"/>
<text x="1174" y="185" font-size="10.8" fill="#52514e">Application (Superset webserver)</text>
<rect x="1154" y="196" width="14" height="14" rx="3" fill="#1baf7a"/>
<text x="1174" y="207" font-size="10.8" fill="#52514e">Database (Postgres) — warehouse or metadata store</text>
<rect x="1144" y="220" width="140" height="24" rx="12" fill="#fcfcfb" stroke="#0ca30c" stroke-width="1.25"/><rect x="1156" y="227" width="11" height="9" rx="2" fill="#0ca30c"/><path d="M 1157.5 227 v -3.5 a 4 4 0 0 1 8 0 v 3.5" fill="none" stroke="#0ca30c" stroke-width="1.6"/><text x="1172" y="236" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" font-weight="700" fill="#0ca30c">olist_reader · RO</text>
<text x="1296" y="236" font-size="10.2" fill="#52514e">read-only Postgres role,</text>
<text x="1296" y="250" font-size="10.2" fill="#52514e">used by both DB edges</text>
<text x="40" y="800" font-size="10.5" fill="#898781">olist-warehouse MCP enforces read-only twice: sql_guard.py rejects non-SELECT text, then Postgres itself runs the session with SET SESSION READ ONLY (authoritative boundary).</text>
<text x="40" y="816" font-size="10.5" fill="#898781">Both edges into Supabase authenticate as olist_reader.&lt;project-ref&gt; over the session pooler (IPv4, prepared statements) — never the privileged postgres user.</text>
<text x="40" y="832" font-size="10.5" fill="#898781">superset MCP and Superset webserver are independent processes that share one Postgres metadata DB (not SQLite — two writers on one SQLite file hit “database is locked”) — verified in docker/superset_config.py and the installed apache-superset[fastmcp]==6.1.0 ARCHITECTURE.md.</text>
<text x="40" y="848" font-size="10.5" fill="#898781">This library-first path explains the chart orderby bug: get_chart_data builds a QueryContext and runs ChartDataCommand directly in-process, bypassing the frontend's client-side buildQuery() step that normally injects the default order-by.</text>
<text x="40" y="864" font-size="10.5" fill="#898781">Claude Code and the olist-warehouse MCP run locally in the .venv; Superset, its MCP, and the metadata DB run in Docker Compose containers, per docker-compose.yml.</text>
</svg>